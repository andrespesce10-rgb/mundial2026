const PC={"group":"pb-group","r32":"pb-r32","r16":"pb-r16","qf":"pb-qf","sf":"pb-sf","3rd":"pb-3rd","final":"pb-f"};
const DN=["Dom","Lun","Mar","Mie","Jue","Vie","Sab"],MN=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago"];
function today(){try{return new Intl.DateTimeFormat("sv",{timeZone:"America/Santiago"}).format(new Date())}catch(e){return new Date(new Date()-4*3600000).toISOString().split("T")[0]}}
function nowMins(){try{const s=new Intl.DateTimeFormat("en-GB",{timeZone:"America/Santiago",hour:"2-digit",minute:"2-digit",hour12:false}).format(new Date());const[h,m]=s.split(":").map(Number);return h*60+m}catch(e){const d=new Date(new Date()-4*3600000);return d.getUTCHours()*60+d.getUTCMinutes()}}
function fmtD(ds){const d=new Date(ds+"T12:00:00");return DN[d.getDay()]+" "+d.getDate()+" "+MN[d.getMonth()]}
function status(ds,ts){const t=today();if(ds<t)return"past";if(ds>t)return"future";const[h,m]=ts.split(":").map(Number);const nm=nowMins();if(nm>h*60+m+105)return"past";if(nm>=h*60+m)return"live";return"today"}

const up=M.filter(m=>{const st=status(m[1],m[2]);return st==="today"||st==="future"});

const bD={};f.forEach(m=>{if(!bD[m[1]])bD[m[1]]=[];bD[m[1]].push(m)});
const c=document.getElementById("matches-container");
const sd=Object.keys(bD).sort();
if(!sd.length){c.innerHTML='<div class="empty">Sin partidos</div>';return}
c.innerHTML=sd.map(date=>{const iT=date===t,iP=date<t;
const cards=bD[date].map(m=>{const[,md,mt,t1,t2,g,ph,v]=m;const st=status(md,mt);const cc=st==="today"||st==="live"?"is-today":ph==="final"?"is-final":st==="past"?"is-past":"";const pb=g?"Grupo "+g:PL[ph];const pbc=PC[ph]||"pb-group";const dc=st==="past"?"dot-past":st==="today"||st==="live"?"dot-today":"dot-future";
return'<div class="match-card '+cc+'"><div class="mtime"><div class="mtime-val">'+mt+'</div><div class="mtime-lbl"><span class="status-dot '+dc+'"></span>CLT</div></div><div class="mteams"><div class="team-row"><span class="flag">'+flag(t1)+'</span><span class="tname">'+t1+"</span></div><hr class='vs-sep'><div class='team-row'><span class='flag'>"+flag(t2)+"</span><span class='tname'>"+t2+'</span></div></div><div class="mmeta"><span class="phase-badge '+pbc+'">'+pb+"</span><br><span class='venue'>"+v+"</span></div></div>"}).join("");
return'<div class="date-section"><div class="date-hdr '+(iT?"is-today":iP?"is-past":"")+'">'+fmtD(date)+(iT?" - HOY":"")+"</div>"+cards+"</div>"}).join("")}
let cdI=null;
function countdown(ds,ts){if(cdI)clearInterval(cdI);function u(){const e=document.getElementById("cd");if(!e){clearInterval(cdI);return}const[h,m]=ts.split(":").map(Number);const mu=new Date(ds+"T00:00:00Z");mu.setUTCHours(h+4,m,0,0);const df=mu-new Date();if(df<=0){e.textContent="EN VIVO";return}const dy=Math.floor(df/86400000),hr=Math.floor(df%86400000/3600000),mn=Math.floor(df%3600000/60000),sc=Math.floor(df%60000/1000);e.textContent=dy>0?dy+"d "+hr+"h "+mn+"m":hr>0?hr+"h "+mn+"m "+sc+"s":mn+"m "+sc+"s"}u();cdI=setInterval(u,1000)}
render();
